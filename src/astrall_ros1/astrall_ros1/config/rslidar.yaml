common:
  msg_source: 1
  send_packet_ros: false
  send_point_cloud_ros: true

lidar:
  - driver:
      lidar_type: RSAIRY
      msop_port: 6699
      difop_port: 7788
      imu_port: 6688
      min_distance: 0.2
      max_distance: 200
      use_lidar_clock: false
      dense_points: true
      # FAST-LIO expects non-negative offsets from the cloud header stamp.
      ts_first_point: true
      start_angle: 0
      end_angle: 360
    ros:
      ros_frame_id: front_lidar_link
      ros_recv_packet_topic: /front/lidar_packets
      ros_send_packet_topic: /front/lidar_packets
      ros_send_imu_data_topic: /front/lidar_imu
      ros_send_point_cloud_topic: /front/lidar_points
      ros_queue_length: 100

  - driver:
      lidar_type: RSAIRY
      msop_port: 6969
      difop_port: 7878
      imu_port: 6868
      min_distance: 0.2
      max_distance: 200
      use_lidar_clock: false
      dense_points: true
      # Keep the same timestamp convention if the rear cloud is fused later.
      ts_first_point: true
      start_angle: 0
      end_angle: 360
    ros:
      ros_frame_id: rear_lidar_link
      ros_recv_packet_topic: /rear/lidar_packets
      ros_send_packet_topic: /rear/lidar_packets
      ros_send_imu_data_topic: /rear/lidar_imu
      ros_send_point_cloud_topic: /rear/lidar_points
      ros_queue_length: 100
